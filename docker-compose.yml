services:
  backend:
    build:
      context: ./backend
      target: runtime
    image: momo-store/backend:1.0.0
    environment:
      HTTP_ADDR: :8081
      ALLOWED_ORIGINS: http://localhost,http://localhost:80,http://127.0.0.1
    expose:
      - "8081"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 64M

  frontend:
    build:
      context: ./frontend
      target: runtime
      args:
        VUE_APP_API_URL: /api
        VUE_APP_PUBLIC_PATH: /
    image: momo-store/frontend:1.0.0
    depends_on:
      api-gateway:
        condition: service_healthy
    ports:
      - "80:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - backend
      - public
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M
        reservations:
          cpus: "0.10"
          memory: 32M

  api-gateway:
    image: nginxinc/nginx-unprivileged:1.27-alpine
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8081:8081"
    volumes:
      - ./docker/api-gateway.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - backend
      - public
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 64M
        reservations:
          cpus: "0.10"
          memory: 16M

networks:
  public:
    driver: bridge
  backend:
    driver: bridge
    internal: true
